services:
  - type: web
    name: buyerforesight-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        fromDatabase:
          name: buyerforesight-db
          property: connectionString

databases:
  - name: buyerforesight-db
    plan: free
